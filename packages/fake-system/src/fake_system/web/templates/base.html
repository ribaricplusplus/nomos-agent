<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Fake System{% endblock %}</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        margin: 0; line-height: 1.5; background: #0f1115; color: #e6e6e6;
      }
      header { padding: 1.25rem 2rem; border-bottom: 1px solid #232733; background: #151823; }
      header h1 { margin: 0; font-size: 1.15rem; }
      header a { color: #9ab; text-decoration: none; }
      main { max-width: 1000px; margin: 0 auto; padding: 2rem; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 0.6rem 0.75rem; border-bottom: 1px solid #232733; }
      th { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; color: #8a93a6; }
      tr:hover td { background: #161a24; }
      .pill { display: inline-block; padding: 0.1rem 0.55rem; border-radius: 999px; font-size: 0.75rem; }
      .pill.active { background: #14361f; color: #6ee7a8; }
      .pill.suspended { background: #3a2a12; color: #f5c06b; }
      .pill.churned { background: #3a1620; color: #f08a9c; }
      .btn {
        display: inline-block; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid #2c3242;
        background: #1b2030; color: #cdd5e2; text-decoration: none; cursor: pointer; font-size: 0.85rem;
      }
      .btn.primary { background: #2b5cff; border-color: #2b5cff; color: #fff; }
      form.edit { display: grid; gap: 1rem; max-width: 520px; }
      label { display: grid; gap: 0.35rem; font-size: 0.85rem; color: #aab2c2; }
      input, select, textarea {
        padding: 0.55rem 0.65rem; border-radius: 6px; border: 1px solid #2c3242;
        background: #11141d; color: #e6e6e6; font: inherit;
      }
      .actions { display: flex; gap: 0.75rem; align-items: center; }
      .muted { color: #6f7891; }
    </style>
  </head>
  <body>
    <header><h1><a href="/">Fake System</a> &middot; Customer Dashboard</h1></header>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
