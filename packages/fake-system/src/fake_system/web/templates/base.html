<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Fake Nomos{% endblock %}</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font: 15px/1.5 system-ui, sans-serif; background: #0f1115; color: #e6e6e6; }
      header { padding: 1.25rem 2rem; border-bottom: 1px solid #293040; background: #151923; }
      header h1 { margin: 0; font-size: 1.15rem; }
      header a { color: inherit; text-decoration: none; }
      main { max-width: 1400px; margin: auto; padding: 2rem; }
      h2 { margin-top: 2rem; }
      .metrics { display: grid; grid-template-columns: repeat(4, minmax(140px, 1fr)); gap: 1rem; }
      .metric { padding: 1rem; border: 1px solid #293040; border-radius: 10px; background: #151923; }
      .metric strong { display: block; font-size: 1.6rem; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; }
      .card { padding: 1rem; border: 1px solid #293040; border-radius: 10px; background: #151923; }
      .card h3 { margin-top: 0; }
      .field { margin-bottom: .85rem; }
      .field dt { color: #8b94a7; font-size: .75rem; text-transform: uppercase; }
      .field dd { margin: .15rem 0 0; white-space: normal; }
      .table-wrap { overflow-x: auto; border: 1px solid #293040; border-radius: 10px; }
      table { width: 100%; border-collapse: collapse; white-space: nowrap; }
      th, td { padding: .65rem .8rem; text-align: left; border-bottom: 1px solid #252b39; }
      th { color: #97a1b4; font-size: .75rem; text-transform: uppercase; }
      .muted { color: #8b94a7; }
      .pill { padding: .15rem .55rem; border-radius: 999px; background: #183723; color: #7ee2a8; }
      .btn { display: inline-block; padding: .4rem .75rem; border: 1px solid #35405a; border-radius: 6px; color: #dce4f2; background: #1c2230; text-decoration: none; }
      .btn.primary { background: #315efb; border-color: #315efb; color: white; }
      form { display: grid; gap: 1rem; max-width: 650px; }
      label { display: grid; gap: .35rem; color: #aab3c5; }
      input, textarea { padding: .65rem; border: 1px solid #35405a; border-radius: 6px; background: #11151e; color: white; font: inherit; }
      .actions { display: flex; gap: .75rem; }
      @media (max-width: 700px) { .metrics, .grid { grid-template-columns: 1fr; } main { padding: 1rem; } }
    </style>
  </head>
  <body>
    <header><h1><a href="/">Fake Nomos · Case Dashboard</a></h1></header>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
